version: '3.8'

services:
  # PostgreSQL + pgvector 数据库
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tender-postgres
    environment:
      POSTGRES_DB: tenderdb
      POSTGRES_USER: tenderuser
      POSTGRES_PASSWORD: tenderpwd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenderuser -d tenderdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tender-network

  # Redis 缓存与消息队列
  redis:
    image: redis:7-alpine
    container_name: tender-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tender-network

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: tender-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - tender-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  tender-network:
    driver: bridge
